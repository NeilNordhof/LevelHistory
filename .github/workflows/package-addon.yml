name: Package Addon

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build zip
        run: |
          mkdir -p dist/LevelHistory
          cp LevelHistory.toc dist/LevelHistory/
          cp main.lua dist/LevelHistory/
          cp icon.tga dist/LevelHistory/
          cp README.md dist/LevelHistory/
          cp CHANGELOG.md dist/LevelHistory/
          cd dist
          zip -r LevelHistory.zip LevelHistory/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LevelHistory
          path: dist/LevelHistory.zip
          if-no-files-found: error

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LevelHistory.zip
